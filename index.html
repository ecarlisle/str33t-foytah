<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Str33t Fortah - 2D Engine</title>
    <style>
        body {
            margin: 0;
            background-color: #1e293b; /* Sleek slate background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }
        canvas {
            background-color: #334155; /* Darker arena container color */
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.5), 0 8px 10px -6px rgb(0 0 0 / 0.5);
            border: 4px solid #475569;
            border-radius: 4px;
            outline: none;
            /* Completely blocks accidental selection highlighting during intense button mashing */
            user-select: none;
            -webkit-user-select: none;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="450"></canvas>

    <script src="./game.js" defer></script>

</body>
</html>
