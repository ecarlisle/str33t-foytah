<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Str33t Fortah - Modular Arena</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0f172a;
            color: #ffffff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 1.5rem;
            color: #06b6d4;
            text-shadow: 0 0 12px rgba(6, 182, 212, 0.4);
        }

        .game-container {
            position: relative;
            border: 4px solid #1e293b;
            border-radius: 12px;
            background-color: #020617;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7),
                        0 0 30px rgba(6, 182, 212, 0.15);
            padding: 10px;
        }

        canvas {
            display: block;
            background-color: #020617;
            border-radius: 6px;
        }

        .controls-legend {
            margin-top: 1.5rem;
            display: flex;
            gap: 3rem;
            font-size: 0.85rem;
            color: #64748b;
            background-color: #1e293b;
            padding: 0.75rem 2rem;
            border-radius: 30px;
            border: 1px solid #334155;
        }

        .player-legend strong {
            color: #cbd5e1;
        }

        .p1-color { color: #ef4444; font-weight: bold; }
        .p2-color { color: #3b82f6; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Str33t Fortah</h1>

    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="controls-legend">
        <div class="player-legend">
            <span class="p1-color">P1 Controls:</span> 
            <strong>A / D</strong> Move | <strong>W</strong> Jump | <strong>Space</strong> Punch | <strong>Q</strong> EX Strike
        </div>
        <div class="player-legend">
            <span class="p2-color">P2 Controls:</span> 
            <strong>← / →</strong> Move | <strong>↑</strong> Jump | <strong>Enter</strong> Punch | <strong>Right Shift</strong> EX Strike
        </div>
    </div>

    <script type="module" src="game.js"></script>

</body>
</html>
